name: Check for Broken Links

on:
  schedule:
    # Run weekly on Mondays at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 2

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@v5
        with:
          path: |
            resources
          key: ${{ runner.os }}-hugo-resources-${{ hashFiles('**/go.mod', '**/go.sum', '**/package-lock.json', '**/pnpm-lock.yaml', '**/yarn.lock', 'hugo.toml', 'hugo.yaml', 'hugo.json', 'config/**', 'assets/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-resources-

      - name: Cache Hugo cacheDir
        uses: actions/cache@v5
        with:
          path: |
            .hugo_cache
          key: ${{ runner.os }}-hugo-cachedir-${{ hashFiles('**/go.mod', '**/go.sum', 'hugo.toml', 'hugo.yaml', 'hugo.json', 'config/**') }}
          restore-keys: |
            ${{ runner.os }}-hugo-cachedir-

      - name: Build site
        run: hugo --gc --minify --cacheDir "${{ github.workspace }}/.hugo_cache"

      - name: Cache Lychee output
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-${{ hashFiles('.lycheecache') }}
          restore-keys: cache-lychee-

      - name: Check for broken links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --cache --max-cache-age 6d --verbose --no-progress --exclude '^(?:/|#|\.)' --exclude '^file:' --exclude '^mailto:' --exclude 'https?://(www\.)?chriswiegman\.com' --exclude-path 'public/library/' './public/**/*.html'
          fail: false
          format: markdown
          jobSummary: true
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Upload lychee report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: ./lychee/out.md
          if-no-files-found: warn

      - name: Create or update issue with broken links report
        if: steps.lychee.outputs.exit_code == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const maxBodyBytes = 60000;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            let report = '';
            try {
              const lycheeOutput = fs.readFileSync('./lychee/out.md', 'utf8');
              const outputBytes = Buffer.byteLength(lycheeOutput, 'utf8');
              if (outputBytes > maxBodyBytes) {
                const trimmed = lycheeOutput.slice(0, Math.floor(maxBodyBytes * 0.9));
                report = `${trimmed}\n\n...output truncated. [See full report in workflow logs](${runUrl}).`;
              } else {
                report = lycheeOutput;
              }
            } catch (error) {
              report = `Could not read lychee output. [See workflow logs](${runUrl}) for details.`;
            }

            const body = `## Broken Links Report\n\n_Generated by weekly link check — [workflow run](${runUrl})_\n\n${report}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: ['broken-links']
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Broken Links Detected',
                body: body,
                labels: ['broken-links', 'bug']
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: body
              });
            }
